<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdgePanel - Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); padding: 40px; width: 100%; max-width: 400px; }
        .brand { text-align: center; font-size: 2rem; font-weight: 700; color: #2c3e50; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 32px; font-size: 0.9rem; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; font-weight: 500; color: #495057; font-size: 0.9rem; }
        input { width: 100%; padding: 10px 14px; border: 1px solid #ced4da; border-radius: 6px; font-size: 1rem; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 3px rgba(52,152,219,0.15); }
        .btn-login { width: 100%; padding: 11px; background: #3498db; color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .btn-login:hover { background: #2980b9; }
        .error { background: #f8d7da; color: #721c24; padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand">&#9889; EdgePanel</div>
    <div class="subtitle">Edge Proxy Management</div>
    <div class="error" id="error-msg"></div>
    <form id="login-form">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-login">Sign In</button>
    </form>
</div>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';
    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            })
        });
        if (res.ok) {
            window.location.href = '/routes';
        } else {
            const d = await res.json().catch(() => ({}));
            errEl.textContent = d.message || 'Invalid credentials';
            errEl.style.display = 'block';
        }
    } catch(err) {
        errEl.textContent = 'Connection error';
        errEl.style.display = 'block';
    }
});
</script>
</body>
</html>
