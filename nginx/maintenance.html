<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            padding: 48px 40px;
            max-width: 480px;
            text-align: center;
        }
        .icon { font-size: 3.5rem; margin-bottom: 16px; }
        h1 { font-size: 1.75rem; color: #2c3e50; margin-bottom: 8px; }
        p { color: #7f8c8d; line-height: 1.6; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">🔧</div>
    <h1>Down for Maintenance</h1>
    <p>We're currently performing scheduled maintenance.<br>Please check back soon.</p>
</div>
</body>
</html>
